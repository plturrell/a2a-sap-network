<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>A2A Network - SAP Business Technology Platform</title>
    
    <!-- SAP Fiori 3.0 Configuration -->
    <script>
        window["sap-ushell-config"] = {
            defaultRenderer: "fiori2",
            renderers: {
                fiori2: {
                    componentData: {
                        config: {
                            enableSearch: true,
                            enablePersonalization: true,
                            enableNotifications: true,
                            enableRecentActivity: true,
                            enableUserImage: true,
                            applications: {
                                "Shell-home": {
                                    enableHideGroups: false,
                                    enableTileActionsIcon: false
                                }
                            }
                        }
                    }
                }
            },
            applications: {
                "A2ANetwork-manage": {
                    title: "A2A Network Management",
                    description: "Enterprise Agent Coordination Platform",
                    additionalInformation: "SAPUI5.Component=com.sap.a2a.network",
                    applicationType: "URL",
                    url: "./",
                    navigationMode: "embedded"
                }
            },
            services: {
                "ClientSideTargetResolution": {
                    adapter: {
                        config: {
                            "inbounds": {}
                        }
                    }
                }
            }
        };
    </script>
    
    <!-- Bootstrap UI5 with Fiori 3.0 -->
    <script id="sap-ui-bootstrap"
        src="https://ui5.sap.com/1.120.0/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon_dark"
        data-sap-ui-resourceroots='{
            "com.sap.a2a.network": "./"
        }'
        data-sap-ui-libs="sap.m,sap.f,sap.ushell,sap.ui.comp,sap.ui.table,sap.uxap,sap.viz,sap.suite.ui.microchart,sap.ui.fl,sap.collaboration"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-language="en"
        data-sap-ui-async="true"
        data-sap-ui-preload="async"
        data-sap-ui-theme-roots='{
            "sap_horizon": "https://ui5.sap.com/1.120.0/resources",
            "sap_horizon_dark": "https://ui5.sap.com/1.120.0/resources",
            "sap_horizon_hcb": "https://ui5.sap.com/1.120.0/resources",
            "sap_horizon_hcw": "https://ui5.sap.com/1.120.0/resources"
        }'
        data-sap-ui-frameOptions="trusted"
        data-sap-ui-flexibilityServices='[{
            "url": "/sap/opu/odata/sap/UI_FLEX_PERS_SRV",
            "connector": "PersonalizationConnector"
        }]'
        data-sap-ui-xx-bindingSyntax="complex"
        data-sap-ui-xx-componentPreload="off">
    </script>
    
    <!-- Socket.IO for real-time updates -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- Custom styles for SAP look -->
    <style>
        html, body, #content {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        .sapUShellFullHeight {
            height: 100%;
        }
        
        /* SAP Fiori 3.0 Shell styles */
        .sapUshellShell {
            height: 100%;
        }
        
        /* Custom branding */
        .sapUshellShellHeader {
            background-color: #1873B4;
        }
        
        .sapUshellShellBrandingBar {
            background-color: #0F5788;
        }
    </style>
    
    <script>
        sap.ui.getCore().attachInit(function() {
            // Initialize Fiori Launchpad Shell
            sap.ushell.Container.createRenderer().placeAt("content");
        });
    </script>
</head>
<body class="sapUiBody sapUShellFullHeight" id="content">
</body>
</html>
